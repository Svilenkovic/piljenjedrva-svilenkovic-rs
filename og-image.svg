<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#654321"/>
    </linearGradient>
    <pattern id="grain" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <path d="M0 10 Q10 8 20 10" stroke="#FFFFFF" stroke-width="0.6" fill="none" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Tree icon -->
  <g transform="translate(120, 200)" fill="#228B22" opacity="0.9">
    <path d="M100 40 L70 90 L85 90 L55 140 L75 140 L40 200 L160 200 L125 140 L145 140 L115 90 L130 90 Z"/>
    <rect x="92" y="200" width="16" height="40" fill="#654321"/>
  </g>

  <!-- Saw blade circle -->
  <g transform="translate(900, 180)" fill="#F5F5DC">
    <circle cx="80" cy="80" r="80" fill="#F5F5DC" opacity="0.15"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#F5F5DC" stroke-width="3" stroke-dasharray="8,8" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#F5F5DC" text-anchor="middle">PILJENJE DRVA</text>
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="42" fill="#228B22" text-anchor="middle">Zagreb &middot; Demo sajta</text>

  <!-- Subtitle -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="24" fill="#F5F5DC" text-anchor="middle" opacity="0.7">piljenjedrva.svilenkovic.rs</text>
</svg>
